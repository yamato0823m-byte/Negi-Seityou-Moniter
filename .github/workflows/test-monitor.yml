name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Guided Negi Experiment
      run: |
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        $picturesFolder = [Environment]::GetFolderPath('MyPictures')
        $csvPath = [System.IO.Path]::Combine($picturesFolder, "negi_data.csv")
        "Time,Leaf_Count,Calculated_H" | Out-File -FilePath $csvPath -Encoding utf8

        # --- STEP 1: 0枚の指示 ---
        Write-Host "=================================================="
        Write-Host " [GUIDE 1/4]: 0 LEAVES TEST "
        Write-Host " >>> Please clean the desk! Make it 0 leaves. <<< "
        Write-Host "=================================================="
        Write-Host "Waiting 15 seconds for setup..."
        Start-Sleep -Seconds 15

        # 1回目の撮影と計算
        powershell -Command "start microsoft.windows.camera:"
        Start-Sleep -Seconds 3
        $wshell = New-Object -ComObject Wscript.Shell
        $wshell.AppActivate("カメラ"); Start-Sleep -Seconds 1; $wshell.SendKeys("%~"); Start-Sleep -Seconds 3
        $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
        $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
        $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
        $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
        $timestamp = (Get-Date).ToString("HH:mm:ss")
        $bitmap.Save([System.IO.Path]::Combine($picturesFolder, "negi_0_leaves.png"), [System.Drawing.Imaging.ImageFormat]::Png)
        # 簡易H計算
        $totalH = 0; $pixels = 0
        for ($x = [int]($screen.Width*0.2); $x -lt [int]($screen.Width*0.8); $x += 15) {
            for ($y = [int]($screen.Height*0.2); $y -lt [int]($screen.Height*0.8); $y += 15) {
                $p = $bitmap.GetPixel($x, $y)
                if ($p.G -gt $p.R -and $p.G -gt $p.B) {
                    $h = $p.GetHue()
                    if ($h -gt 50 -and $h -lt 170) { $totalH += $h; $pixels++ }
                }
            }
        }
        $h0 = if ($pixels -gt 0) { [Math]::Round(($totalH / $pixels), 2) } else { 0 }
        "$timestamp,0_leaves,$h0" | Out-File -FilePath $csvPath -Append -Encoding utf8
        $graphic.Dispose(); $bitmap.Dispose(); powershell -Command "Stop-Process -Name 'Camera' -Force -ErrorAction Ignore"
        Write-Host "-> Saved 0 leaves data! (H: $h0)"
        Write-Host "Interval waiting 15 seconds..."
        Start-Sleep -Seconds 15


        # --- STEP 2: 1枚の指示 ---
        Write-Host "=================================================="
        Write-Host " [GUIDE 2/4]: 1 LEAF TEST "
        Write-Host " >>> Please ADD 1 LEAF on the desk now! <<< "
        Write-Host "=================================================="
        Write-Host "Waiting 15 seconds for setup..."
        Start-Sleep -Seconds 15

        # 2回目の撮影と計算
        powershell -Command "start microsoft.windows.camera:"
        Start-Sleep -Seconds 3
        $wshell.AppActivate("カメラ"); Start-Sleep -Seconds 1; $wshell.SendKeys("%~"); Start-Sleep -Seconds 3
        $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
        $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
        $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
        $timestamp = (Get-Date).ToString("HH:mm:ss")
        $bitmap.Save([System.IO.Path]::Combine($picturesFolder, "negi_1_leaf.png"), [System.Drawing.Imaging.ImageFormat]::Png)
        $totalH = 0; $pixels = 0
        for ($x = [int]($screen.Width*0.2); $x -lt [int]($screen.Width*0.8); $x += 15) {
            for ($y = [int]($screen.Height*0.2); $y -lt [int]($screen.Height*0.8); $y += 15) {
                $p = $bitmap.GetPixel($x, $y)
                if ($p.G -gt $p.R -and $p.G -gt $p.B) {
                    $h = $p.GetHue()
                    if ($h -gt 50 -and $h -lt 170) { $totalH += $h; $pixels++ }
                }
            }
        }
        $h1 = if ($pixels -gt 0) { [Math]::Round(($totalH / $pixels), 2) } else { 0 }
        "$timestamp,1_leaf,$h1" | Out-File -FilePath $csvPath -Append -Encoding utf8
        $graphic.Dispose(); $bitmap.Dispose(); powershell -Command "Stop-Process -Name 'Camera' -Force -ErrorAction Ignore"
        Write-Host "-> Saved 1 leaf data! (H: $h1)"
        Write-Host "Interval waiting 15 seconds..."
        Start-Sleep -Seconds 15


        # --- STEP 3: 2枚の指示 ---
        Write-Host "=================================================="
        Write-Host " [GUIDE 3/4]: 2 LEAVES TEST "
        Write-Host " >>> Please ADD 2ND LEAF on the desk now! <<< "
        Write-Host "=================================================="
