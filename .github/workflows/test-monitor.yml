        Write-Host "Interval waiting 15 seconds..."
        Start-Sleep -Seconds 15


        # --- STEP 4: 3枚の指示 ---
        Write-Host "=================================================="
        Write-Host " [GUIDE 4/4]: 3 LEAVES TEST "
