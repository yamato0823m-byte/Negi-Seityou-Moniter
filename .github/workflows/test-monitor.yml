name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4.2.2

    - name: 2. Step-by-Step Growth Curve Monitor
      run: |
        $ErrorActionPreference = "Stop"
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName WindowsBase
        [void][Reflection.Assembly]::LoadWithPartialName("System.Windows.Forms.DataVisualization")

        $userProfile = $env:USERPROFILE
        
        # スクリーンショットで確認できた実際の保存先（OneDriveの日本語パス）を最優先指定
        $cameraRollFolder = Join-Path $userProfile "OneDrive\ピクチャ\カメラロール"
        
        # 万が一存在しない場合のバックアップ候補
        if (-not (Test-Path $cameraRollFolder)) {
            $cameraRollFolder = Join-Path $userProfile "Pictures\Camera Roll"
        }

        Write-Host "--- SYSTEM INFO ---"
        Write-Host "Target Camera Roll Directory: $cameraRollFolder"
        Write-Host "-------------------"

        $csvPath = Join-Path $cameraRollFolder "negi_growth_log.csv"
        if (-not (Test-Path $csvPath)) {
            "DateTime,Step,Green_Ratio_Percent,Fitted_Line_Value" | Out-File -FilePath $csvPath -Encoding utf8
        }

        # 最新のJPGを取得する関数
        function Get-LatestPhoto {
            param (
                [datetime]$afterTime
            )
            if (Test-Path $cameraRollFolder) {
                return Get-ChildItem -Path $cameraRollFolder -Filter "*.jpg" -ErrorAction SilentlyContinue |
                        Where-Object { $_.LastWriteTime -ge $afterTime } |
                        Sort-Object LastWriteTime -Descending |
                        Select-Object -First 1
            }
            return $null
        }

        # --- ポップアップ表示関数 ---
        function Show-Guide {
            param (
                [string]$title,
                [string]$msg,
                [string]$graphImgPath,
                [bool]$isFinal
            )
            try {
                $form = New-Object System.Windows.Forms.Form
                $form.Text = "NEGI MONITOR REALTIME MONITOR"
                if ($graphImgPath -and (Test-Path $graphImgPath)) { $form.Size = New-Object System.Drawing.Size(550, 560) } else { $form.Size = New-Object System.Drawing.Size(550, 220) }
                $form.StartPosition = "CenterScreen"
                $form.TopMost = $true
                $form.BackColor = [System.Drawing.Color]::FromArgb(30, 30, 30)
                $form.FormBorderStyle = "FixedDialog"
                $form.MaximizeBox = $false

                $lblTitle = New-Object System.Windows.Forms.Label
                $lblTitle.Text = $title
                $lblTitle.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
                $lblTitle.ForeColor = [System.Drawing.Color]::ForestGreen
                $lblTitle.Size = New-Object System.Drawing.Size(510, 30)
                $lblTitle.Location = New-Object System.Drawing.Point(20, 20)
                $lblTitle.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTitle)

                $lblMsg = New-Object System.Windows.Forms.Label
                $lblMsg.Text = $msg
                $lblMsg.Font = New-Object System.Drawing.Font("Arial", 11, [System.Drawing.FontStyle]::Bold)
                $lblMsg.ForeColor = [System.Drawing.Color]::White
                $lblMsg.Size = New-Object System.Drawing.Size(510, 50)
                $lblMsg.Location = New-Object System.Drawing.Point(20, 60)
                $lblMsg.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblMsg)

                if ($graphImgPath -and (Test-Path $graphImgPath)) {
                    $pictureBox = New-Object System.Windows.Forms.PictureBox
                    $pictureBox.Size = New-Object System.Drawing.Size(500, 300)
                    $pictureBox.Location = New-Object System.Drawing.Point(20, 120)
                    $pictureBox.SizeMode = [System.Windows.Forms.PictureBoxSizeMode]::StretchImage
                    $bytes = [System.IO.File]::ReadAllBytes($graphImgPath)
                    $ms = New-Object System.IO.MemoryStream(,$bytes)
                    $pictureBox.Image = [System.Drawing.Image]::FromStream($ms)
                    $form.Controls.Add($pictureBox)
                    $timerY = 440
                } else {
                    $timerY = 130
                }

                $lblTimer = New-Object System.Windows.Forms.Label
                $lblTimer.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
                $lblTimer.Size = New-Object System.Drawing.Size(510, 30)
                $lblTimer.Location = New-Object System.Drawing.Point(20, $timerY)
                $lblTimer.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTimer)

                $form.Show()
                $maxTime = 12
                for ($countdown = $maxTime; $countdown -gt 0; $countdown--) {
                    if ($isFinal) {
                        $lblTimer.ForeColor = [System.Drawing.Color]::LightBlue
                        $lblTimer.Text = "Closing window in $($countdown)s..."
                    } else {
                        $lblTimer.ForeColor = [System.Drawing.Color]::Yellow
                        $lblTimer.Text = "Remaining: $($countdown)s"
                    }
                    [System.Windows.Forms.Application]::DoEvents()
                    Start-Sleep -Seconds 1
                }
                $form.Close()
                if ($pictureBox) { $pictureBox.Dispose(); $ms.Dispose() }
                $form.Dispose()
            } catch {
                Write-Warning "Failed to show popup: $_"
            }
        }

        # 緑色面積の割合（%）を計算する関数
        function Get-GreenRatioPercent {
            param (
                [string]$path
            )
            if (-not (Test-Path $path)) {
                throw "Image file not found: $path"
            }

            $img = [System.Drawing.Bitmap]::FromFile($path)
            $greenCount = 0
            $totalCount = 0
            
            for ($x = 0; $x -lt $img.Width; $x += 2) {
                for ($y = 0; $y -lt $img.Height; $y += 2) {
                    $totalCount++
                    $p = $img.GetPixel($x, $y)
                    
                    $h = $p.GetHue()
                    $s = $p.GetSaturation()
                    $b = $p.GetBrightness()

                    if (($h -ge 25 -and $h -le 165) -and ($s -ge 0.05) -and ($b -ge 0.03 -and $b -le 0.98)) {
                        $greenCount++
                    }
                }
            }
            $img.Dispose()
            
            if ($totalCount -eq 0) { return 0.0 }
            return [math]::Round(($greenCount / $totalCount) * 100, 2)
        }

        # グラフ描画
        function Save-NegiChart {
            param (
                [int]$stepCount,
                [double[]]$ratioArray,
                [string]$timeStr,
                [string]$outputPath
            )
            try {
                $chart = New-Object System.Windows.Forms.DataVisualization.Charting.Chart
                $chart.Size = New-Object System.Drawing.Size(500, 320)
                $chartArea = New-Object System.Windows.Forms.DataVisualization.Charting.ChartArea
                $chartArea.AxisX.Title = "Leaf Count"
                $chartArea.AxisX.Interval = 1
                $chartArea.AxisX.Minimum = 0
                $chartArea.AxisX.Maximum = 4
                $chartArea.AxisY.Title = "Green Area Ratio (%)"
                
                $maxVal = 1.0
                foreach ($val in $ratioArray) { if ($val -gt $maxVal) { $maxVal = $val } }
                $chartArea.AxisY.Maximum = [math]::Ceiling($maxVal * 1.3)
                if ($chartArea.AxisY.Maximum -lt 5.0) { $chartArea.AxisY.Maximum = 40.0 }
                $chartArea.AxisY.Minimum = 0
                $chart.ChartAreas.Add($chartArea)

                $seriesRaw = New-Object System.Windows.Forms.DataVisualization.Charting.Series
                $seriesRaw.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Point
                $seriesRaw.MarkerStyle = [System.Windows.Forms.DataVisualization.Charting.MarkerStyle]::Circle
                $seriesRaw.MarkerSize = 14
                $seriesRaw.MarkerColor = [System.Drawing.Color]::DeepSkyBlue
                $seriesRaw.Name = "Actual Area (%)"
                $chart.Series.Add($seriesRaw)

                $seriesFit = New-Object System.Windows.Forms.DataVisualization.Charting.Series
                $seriesFit.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Line
                $seriesFit.BorderWidth = 3
                $seriesFit.Color = [System.Drawing.Color]::OrangeRed
                $seriesFit.Name = "Trend Line"
                $chart.Series.Add($seriesFit)

                $sumX = 0; $sumY = 0; $sumXY = 0; $sumX2 = 0
                for ($i = 0; $i -lt $stepCount; $i++) {
                    $x = $i
                    $y = $ratioArray[$i]
                    $sumX += $x ; $sumY += $y ; $sumXY += ($x * $y) ; $sumX2 += ($x * $x)
                }
                
                $slope = 0; $intercept = 0
                if (($stepCount * $sumX2 - $sumX * $sumX) -ne 0) {
                    $slope = ($stepCount * $sumXY - $sumX * $sumY) / ($stepCount * $sumX2 - $sumX * $sumX)
                    $intercept = ($sumY - $slope * $sumX) / $stepCount
                }

                for ($i = 0; $i -lt $stepCount; $i++) {
                    $seriesRaw.Points.AddXY($i, $ratioArray[$i])
                    $fitted = [math]::Round(($slope * $i + $intercept), 2)
                    $seriesFit.Points.AddXY($i, $fitted)
                    "${timeStr},${i},$($ratioArray[$i]),${fitted}" | Out-File -FilePath $csvPath -Append -Encoding utf8
                }

                $legend = New-Object System.Windows.Forms.DataVisualization.Charting.Legend
                $legend.Docking = [System.Windows.Forms.DataVisualization.Charting.Docking]::Bottom
                $chart.Legends.Add($legend)

                $title = New-Object System.Windows.Forms.DataVisualization.Charting.Title
                $title.Text = "Leaf Area Ratio Graph (Steps: 1 to $stepCount)"
                $title.Font = New-Object System.Drawing.Font("Arial", 11, [System.Drawing.FontStyle]::Bold)
                $chart.Titles.Add($title)

                $subtitle = New-Object System.Windows.Forms.DataVisualization.Charting.Title
                $subtitle.Text = "Green Threshold: H[25-165] S[>=5%] B[3-98%]"
                $subtitle.Font = New-Object System.Drawing.Font("Arial", 8.5, [System.Drawing.FontStyle]::Regular)
                $subtitle.ForeColor = [System.Drawing.Color]::DarkGreen
                $chart.Titles.Add($subtitle)

                $chart.SaveImage($outputPath, [System.Windows.Forms.DataVisualization.Charting.ChartImageFormat]::Png)
                $chart.Dispose()
            } catch {
                Write-Warning "Failed to save chart: $_"
            }
        }

        # 1撮影の処理
        function Capture-Photo {
            param (
                [int]$stepIndex
            )
            Stop-Process -Name "Camera" -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 1
            
            $captureTriggerTime = Get-Date
            Write-Host "[DEBUG] Step ${stepIndex} - Capture trigger time: $captureTriggerTime"

            powershell -Command "start microsoft.windows.camera:"
            Start-Sleep -Seconds 4
            
            $wshell = New-Object -ComObject Wscript.Shell
            [void]$wshell.AppActivate("Camera")
            [void]$wshell.AppActivate("カメラ")
            Start-Sleep -Seconds 1
            
            # 1回シャッターを切る
            Write-Host "[DEBUG] Sending 1 shutter key..."
            $wshell.SendKeys("{ENTER}")

            $afterFile = $null
            for ($i = 1; $i -le 10; $i++) {
                Start-Sleep -Seconds 1
                $afterFile = Get-LatestPhoto -afterTime $captureTriggerTime
                if ($afterFile) {
                    Write-Host "[DEBUG] Photo detected at: $($afterFile.FullName)"
                    break
                }
                Write-Host "[DEBUG] Waiting for photo save... (${i}s)"
            }

            # 見つからない場合はフォルダ内の最新画像を使用
            if (-not $afterFile) {
                $afterFile = Get-ChildItem -Path $cameraRollFolder -Filter "*.jpg" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            }

            if (-not $afterFile) {
                throw "No photo file detected in: $cameraRollFolder"
            }

            $now = Get-Date
            $timeStr = $now.ToString('yyyy.M.d_H.mm.ss')
            $finalPath = Join-Path $cameraRollFolder "negi_step_${stepIndex}_${timeStr}.jpg"

            Start-Sleep -Seconds 1
            Copy-Item -Path $afterFile.FullName -Destination $finalPath -Force

            Stop-Process -Name "Camera" -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 1
            
            Write-Host "====================="
            Write-Host "Photo Successfully Processed!"
            Write-Host "Assigned Path: $finalPath"
            Write-Host "====================="

            return ,@($finalPath, $timeStr)
        }

        # --- 実験スタート ---
        [double[]]$allRatios = @()

        # 1回目〜3回目（0枚、1枚、2枚）
        $instructions1 = @("Make it 0 leaves on the desk.", "Place 1 leaf on the desk.", "Place 2 leaves on the desk.")
        for ($i = 0; $i -lt 3; $i++) {
            $stepDisplay = $i + 1
            Show-Guide -title "Capturing Step $stepDisplay" -msg $instructions1[$i] -graphImgPath $null -isFinal $false
            $res = Capture-Photo -stepIndex $i
            $path = $res[0]
            $ratio = Get-GreenRatioPercent -path $path
            $allRatios += $ratio
            Write-Host "Step $i calculated green ratio: $ratio %"
        }

        # 中間プロット（3ステップ完了時点）
        $midTime = (Get-Date).ToString('yyyy.M.d_H.mm.ss')
        $midGraphPath = Join-Path $cameraRollFolder "negi_graph_mid_${midTime}.png"
        Save-NegiChart -stepCount 3 -ratioArray $allRatios -timeStr $midTime -outputPath $midGraphPath
        Show-Guide -title "MID-EXPERIMENT GRAPH (0-2 Leaves)" -msg "Calculated first 3 steps!" -graphImgPath $midGraphPath -isFinal $false

        # 4回目〜5回目（3枚、4枚）
        $instructions2 = @("Place 3 leaves on the desk.", "Place 4 leaves on the desk.")
        for ($i = 3; $i -lt 5; $i++) {
            $stepDisplay = $i + 1
            Show-Guide -title "Capturing Step $stepDisplay" -msg $instructions2[$i-3] -graphImgPath $null -isFinal $false
            $res = Capture-Photo -stepIndex $i
            $path = $res[0]
            $ratio = Get-GreenRatioPercent -path $path
            $allRatios += $ratio
            Write-Host "Step $i calculated green ratio: $ratio %"
        }

        # 最終プロット（全5ステップ完了時点）
        $finalTime = (Get-Date).ToString('yyyy.M.d_H.mm.ss')
        $finalGraphPath = Join-Path $cameraRollFolder "negi_graph_final_${finalTime}.png"
        Save-NegiChart -stepCount 5 -ratioArray $allRatios -timeStr $finalTime -outputPath $finalGraphPath
        Show-Guide -title "FINAL EXPERIMENT GRAPH (0-4 Leaves)" -msg "All 5 steps plotted successfully!" -graphImgPath $finalGraphPath -isFinal $true

        exit 0
