name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4.2.2

    - name: 2. Advanced Growth Curve Monitor
      run: |
        $ErrorActionPreference = "SilentlyContinue"
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName WindowsBase
        [void][Reflection.Assembly]::LoadWithPartialName("System.Windows.Forms.DataVisualization")

        # Windows標準の本物の「カメラロール」フォルダのパスを正確に取得
        $picturesFolder = [Environment]::GetFolderPath('MyPictures')
        $cameraRollFolder = [System.IO.Path]::Combine($picturesFolder, "Camera Roll")
        if (-not (Test-Path $cameraRollFolder)) {
            New-Item -ItemType Directory -Path $cameraRollFolder | Out-Null
        }

        $csvPath = [System.IO.Path]::Combine($cameraRollFolder, "negi_growth_log.csv")
        if (-not (Test-Path $csvPath)) {
            "DateTime,Step,Raw_Pixel_Count,Fitted_Line_Value" | Out-File -FilePath $csvPath -Encoding utf8
        }

        # ウインドウ制御用のWin32 APIを定義
        $csharpCode = "using System; using System.Runtime.InteropServices; public class WindowHelper { [DllImport(`"user32.dll`")] public static extern bool ShowWindow(IntPtr hWnd, int nCmdShow); [DllImport(`"user32.dll`")] public static extern IntPtr FindWindow(string lpClassName, string lpWindowName); [DllImport(`"user32.dll`")] public static extern bool SetForegroundWindow(IntPtr hWnd); }"
        Add-Type -TypeDefinition $csharpCode

        # --- ポップアップ表示関数 ---
        function Show-Guide ($title, $msg, $graphImgPath, $isFinal) {
            try {
                $form = New-Object System.Windows.Forms.Form
                $form.Text = "NEGI MONITOR REALTIME MONITOR"
                if ($graphImgPath -and (Test-Path $graphImgPath)) { $form.Size = New-Object System.Drawing.Size(550, 560) } else { $form.Size = New-Object System.Drawing.Size(550, 220) }
                $form.StartPosition = "CenterScreen"
                $form.TopMost = $true
                $form.BackColor = [System.Drawing.Color]::FromArgb(30, 30, 30)
                $form.FormBorderStyle = "FixedDialog"
                $form.MaximizeBox = $false

                $lblTitle = New-Object System.Windows.Forms.Label
                $lblTitle.Text = $title
                $lblTitle.Font = New-Object System.Drawing.Font("Arial", 16, [System.Drawing.FontStyle]::Bold)
                $lblTitle.ForeColor = [System.Drawing.Color]::ForestGreen
                $lblTitle.Size = New-Object System.Drawing.Size(510, 30)
                $lblTitle.Location = New-Object System.Drawing.Point(20, 20)
                $lblTitle.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTitle)

                $lblMsg = New-Object System.Windows.Forms.Label
                $lblMsg.Text = $msg
                $lblMsg.Font = New-Object System.Drawing.Font("Arial", 11, [System.Drawing.FontStyle]::Bold)
                $lblMsg.ForeColor = [System.Drawing.Color]::White
                $lblMsg.Size = New-Object System.Drawing.Size(510, 50)
                $lblMsg.Location = New-Object System.Drawing.Point(20, 60)
                $lblMsg.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblMsg)

                if ($graphImgPath -and (Test-Path $graphImgPath)) {
                    $pictureBox = New-Object System.Windows.Forms.PictureBox
                    $pictureBox.Size = New-Object System.Drawing.Size(500, 300)
                    $pictureBox.Location = New-Object System.Drawing.Point(20, 120)
                    $pictureBox.SizeMode = [System.Windows.Forms.PictureBoxSizeMode]::StretchImage
                    $bytes = [System.IO.File]::ReadAllBytes($graphImgPath)
                    $ms = New-Object System.IO.MemoryStream(,$bytes)
                    $pictureBox.Image = [System.Drawing.Image]::FromStream($ms)
                    $form.Controls.Add($pictureBox)
                    $timerY = 440
                } else {
                    $timerY = 130
                }

                $lblTimer = New-Object System.Windows.Forms.Label
                $lblTimer.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
                $lblTimer.Size = New-Object System.Drawing.Size(510, 30)
                $lblTimer.Location = New-Object System.Drawing.Point(20, $timerY)
                $lblTimer.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTimer)

                $form.Show()
                $maxTime = if ($isFinal) { 12 } else { 15 }
                for ($countdown = $maxTime; $countdown -gt 0; $countdown--) {
                    if ($isFinal) {
                        $lblTimer.ForeColor = [System.Drawing.Color]::LightBlue
                        $lblTimer.Text = "Closing this window automatically in $($countdown)s..."
                    } else {
                        $lblTimer.ForeColor = [System.Drawing.Color]::Yellow
                        $lblTimer.Text = "Remaining: $($countdown)s"
                    }
                    [System.Windows.Forms.Application]::DoEvents()
                    Start-Sleep -Seconds 1
                }
                $form.Close()
                if ($pictureBox) { $pictureBox.Dispose(); $ms.Dispose() }
                $form.Dispose()
            } catch {}
        }

        # 実験設定 (5回撮影)
        $labels = @("1st Capturing", "2nd Capturing", "3rd Capturing", "4th Capturing", "5th Capturing")
        $instructions = @(
            "Please place leaves for the 1st photo.",
            "Please place leaves for the 2nd photo.",
            "Please place leaves for the 3rd photo.",
            "Please place leaves for the 4th photo.",
            "Please place leaves for the 5th photo."
        )
        $capturedPhotoPaths = @()
        $capturedTimeStrings = @()

        # --- STEP 1: 5回連続で写真を撮影 ---
        for ($i = 0; $i -lt 5; $i++) {
            Show-Guide -title $labels[$i] -msg $instructions[$i] -graphImgPath $null -isFinal $false

            # カメラアプリ起動
            powershell -Command "start microsoft.windows.camera:"
            Start-Sleep -Seconds 3
            
            # カメラウィンドウを確実に最前面に引っ張り出して最大化
            $hwnd = [WindowHelper]::FindWindow("ApplicationFrameWindow", "カメラ")
            if ($hwnd -ne [IntPtr]::Zero) {
                [WindowHelper]::SetForegroundWindow($hwnd) | Out-Null
                [WindowHelper]::ShowWindow($hwnd, 3)
            }
            Start-Sleep -Seconds 2

            $wshell = New-Object -ComObject Wscript.Shell
            $wshell.AppActivate("Camera")
            Start-Sleep -Seconds 1

            # カメラ切り替え (Alt + C)
            $wshell.SendKeys("%c")
            Start-Sleep -Seconds 4

            # 撮影 (Alt + Enter)
            $wshell.SendKeys("%~")
            Start-Sleep -Seconds 3

            # 日本時間の日付文字列を作成
            $now = Get-Date
            $timeStr = $now.ToString("yyyy.M.d_H.mm.ss")
            $capturedTimeStrings += $timeStr

            $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
            $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
            
            # 保存
            $photoPath = [System.IO.Path]::Combine($cameraRollFolder, "negi_step_${i}_${timeStr}.png")
            $bitmap.Save($photoPath, [System.Drawing.Imaging.ImageFormat]::Png)
            $capturedPhotoPaths += $photoPath

            $graphic.Dispose(); $bitmap.Dispose()
            powershell -Command "Stop-Process -Name 'Camera' -Force"
            Start-Sleep -Seconds 2
        }

        # --- STEP 2: 撮影した全画像を解析（絶対ピクセル数を抽出） ---
        $rawPixelValues = @()
        
        foreach ($path in $capturedPhotoPaths) {
            $img = [System.Drawing.Bitmap]::FromFile($path)
            $greenPixels = 0

            for ($x = [int]($img.Width*0.1); $x -lt [int]($img.Width*0.9); $x++) {
                for ($y = [int]($img.Height*0.1); $y -lt [int]($img.Height*0.9); $y++) {
                    $p = $img.GetPixel($x, $y)
                    
                    if ($p.GetBrightness() -gt 0.15 -and $p.GetSaturation() -gt 0.20) {
                        if ($p.G -gt $p.R -and $p.G -gt $p.B) {
                            $h = $p.GetHue()
                            if ($h -gt 55 -and $h -lt 165) { $greenPixels++ }
                        }
                    }
                }
            }
            $rawPixelValues += $greenPixels
            $img.Dispose()
        }

        # --- STEP 3: 最小二乗法による回帰直線の計算 (y = ax + b) ---
        # X軸は撮影回数のインデックス (1, 2, 3, 4, 5) とする
        $n = 5
        $sumX = 0; $sumY = 0; $sumXY = 0; $sumX2 = 0
        for ($i = 0; $i -lt $n; $i++) {
            $x = $i + 1
            $y = $rawPixelValues[$i]
            $sumX += $x
            $sumY += $y
            $sumXY += ($x * $y)
            $sumX2 += ($x * $x)
        }
        
        # 傾き(a) と 切片(b) の計算
        $slope = ($n * $sumXY - $sumX * $sumY) / ($n * $sumX2 - $sumX * $sumX)
        $intercept = ($sumY - $slope * $sumX) / $n

        # 直線上の計算値を算出
        $fittedValues = @(0, 0, 0, 0, 0)
        for ($i = 0; $i -lt $n; $i++) {
            $x = $i + 1
            $fittedValues[$i] = [math]::Round($slope * $x + $intercept)
        }

        # --- STEP 4: リアルプロット＆回帰直線グラフの生成 ---
        $finalTimeStr = $capturedTimeStrings[4] 
        $graphImgPath = [System.IO.Path]::Combine($cameraRollFolder, "negi_graph_${finalTimeStr}.png")

        try {
            $chart = New-Object System.Windows.Forms.DataVisualization.Charting.Chart
            $chart.Size = New-Object System.Drawing.Size(500, 300)

            $chartArea = New-Object System.Windows.Forms.DataVisualization.Charting.ChartArea
            $chartArea.AxisX.Title = "Measurement Order (1st to 5th)"
            $chartArea.AxisX.Interval = 1
            $chartArea.AxisY.Title = "Actual Green Pixel Count"
            
            # Y軸の最小値をデータの最低値より少し下に自動設定
            $minPixel = ($rawPixelValues | Measure-Object -Minimum).Minimum
            $chartArea.AxisY.Minimum = [math]::Max(0, [math]::Round($minPixel * 0.8))
            $chart.ChartAreas.Add($chartArea)

            # 1. 実際のバラつき面積（ドットプロット用シリーズ）
            $seriesRaw = New-Object System.Windows.Forms.DataVisualization.Charting.Series
            $seriesRaw.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Point
            $seriesRaw.MarkerStyle = [System.Windows.Forms.DataVisualization.Charting.MarkerStyle]::Circle
            $seriesRaw.MarkerSize = 14
            $seriesRaw.MarkerColor = [System.Drawing.Color]::DeepSkyBlue
            $seriesRaw.Name = "Actual Area"
            $chart.Series.Add($seriesRaw)

            # 2. 平均をあらわす直線（トレンドライン用シリーズ）
            $seriesFit = New-Object System.Windows.Forms.DataVisualization.Charting.Series
            $seriesFit.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Line
            $seriesFit.BorderWidth = 3
            $seriesFit.Color = [System.Drawing.Color]::OrangeRed
            $seriesFit.Name = "Trend Line"
            $chart.Series.Add($seriesFit)

            # データの追加
            for ($j = 0; $j -lt $n; $j++) {
                $xIdx = $j + 1
                $seriesRaw.Points.AddXY($xIdx, $rawPixelValues[$j])
                $seriesFit.Points.AddXY($xIdx, $fittedValues[$j])

                # CSVログに書き込み
                "${finalTimeStr},${xIdx},$($rawPixelValues[$j]),$($fittedValues[$j])" | Out-File -FilePath $csvPath -Append -Encoding utf8
            }

            # 凡例の追加
            $legend = New-Object System.Windows.Forms.DataVisualization.Charting.Legend
            $legend.Docking = [System.Windows.Forms.DataVisualization.Charting.Docking]::Bottom
            $chart.Legends.Add($legend)

            $title = New-Object System.Windows.Forms.DataVisualization.Charting.Title
            $title.Text = "Real Leaf Area & Trend Line (${finalTimeStr})"
            $title.Font = New-Object System.Drawing.Font("Arial", 11, [System.Drawing.FontStyle]::Bold)
            $chart.Titles.Add($title)

            $chart.SaveImage($graphImgPath, [System.Windows.Forms.DataVisualization.Charting.ChartImageFormat]::Png)
            $chart.Dispose()
        } catch {}

        # --- STEP 5: 終了メッセージ画面 ---
        Show-Guide -title "EXPERIMENT COMPLETELY FINISHED!" -msg "Real size plots and correct trend line generated successfully!" -graphImgPath $graphImgPath -isFinal $true
        
        exit 0
