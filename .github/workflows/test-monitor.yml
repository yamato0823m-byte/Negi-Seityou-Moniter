                    if ($h -gt 50 -and $h -lt 170) { $totalH += $h; $pixels++ }
                }
            }
        }
        $h2 = if ($pixels -gt 0) { [Math]::Round(($totalH / $pixels), 2) } else { 0 }
        "$timestamp,2_leaves,$h2" | Out-File -FilePath $csvPath -Append -Encoding utf8
