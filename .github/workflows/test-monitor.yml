name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. GitHubから最新のコードをあなたのPCに持ってくる
      uses: actions/checkout@v4

    - name: 2. 撮影用プログラム(exe)をダウンロードする
      run: |
        curl -L -o camera_test.exe "https://github.com/yamato0823m-byte/Negi-Seityou-Moniter/raw/main/camera_test.exe"
        if (-not (Test-Path camera_test.exe)) {
          Write-Host "★ネットからexeを直接取得します"
          curl -L -o camera_test.exe "https://raw.githubusercontent.com/rentalserver-test/test/main/camera_test.exe"
        }

    - name: 3. カメラを起動して3枚撮影する
      run: |
        Write-Host "★テスト開始: カメラを起動します"
        ./camera_test.exe
        Write-Host "★テスト終了: 撮影完了しました"
