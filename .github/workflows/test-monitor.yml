name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Full Automatic Negi Experiment with Graph
      run: |
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName WindowsBase
        [void][Reflection.Assembly]::LoadWithPartialName("System.Windows.Forms.DataVisualization")

        $picturesFolder = [Environment]::GetFolderPath('MyPictures')
        $csvPath = [System.IO.Path]::Combine($picturesFolder, "negi_data.csv")
        $graphPath = [System.IO.Path]::Combine($picturesFolder, "negi_graph.png")
        
        "Time,Leaf_Count,Calculated_H" | Out-File -FilePath $csvPath -Encoding utf8

        # --- English Guide Widget ---
        function Show-Guide ($title, $msg) {
            $form = New-Object System.Windows.Forms.Form
            $form.Text = "NEGI MONITOR GUIDE"
            $form.Size = New-Object System.Drawing.Size(550,220)
            $form.StartPosition = "CenterScreen"
            $form.TopMost = $true
            $form.BackColor = [System.Drawing.Color]::FromArgb(30, 30, 30)
            $form.FormBorderStyle = "FixedDialog"
            $form.MaximizeBox = $false

            $lblTitle = New-Object System.Windows.Forms.Label
            $lblTitle.Text = $title
            $lblTitle.Font = New-Object System.Drawing.Font("Arial", 16, [System.Drawing.FontStyle]::Bold)
            $lblTitle.ForeColor = [System.Drawing.Color]::ForestGreen
            $lblTitle.Size = New-Object System.Drawing.Size(510, 30)
            $lblTitle.Location = New-Object System.Drawing.Point(20, 20)
            $lblTitle.TextAlign = "Center"

            $lblMsg = New-Object System.Windows.Forms.Label
            $lblMsg.Text = $msg
            $lblMsg.Font = New-Object System.Drawing.Font("Arial", 12, [System.Drawing.FontStyle]::Bold)
            $lblMsg.ForeColor = [System.Drawing.Color]::White
            $lblMsg.Size = New-Object System.Drawing.Size(510, 60)
            $lblMsg.Location = New-Object System.Drawing.Point(20, 60)
            $lblMsg.TextAlign = "Center"

            $lblTimer = New-Object System.Windows.Forms.Label
            $lblTimer.Text = "Remaining: 15s"
            $lblTimer.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
            $lblTimer.ForeColor = [System.Drawing.Color]::Yellow
            $lblTimer.Size = New-Object System.Drawing.Size(510, 30)
            $lblTimer.Location = New-Object System.Drawing.Point(20, 130)
            $lblTimer.TextAlign = "Center"

            $form.Controls.Add($lblTitle)
            $form.Controls.Add($lblMsg)
            $form.Controls.Add($lblTimer)

            $form.Show()
            for ($countdown = 15; $countdown -gt 0; $countdown--) {
                $lblTimer.Text = "Remaining: $($countdown)s"
                [System.Windows.Forms.Application]::DoEvents()
                Start-Sleep -Seconds 1
            }
            $form.Close()
        }

        $hValues = @()
        $labels = @("0 Leaves Test", "1 Leaf Test", "2 Leaves Test", "3 Leaves Test")
        $instructions = @(
            "Please clean the desk! Make it 0 leaves.",
            "Please ADD 1 leaf on the desk now!",
            "Please ADD 2nd leaf on the desk now!",
            "Please ADD 3rd leaf on the desk now!"
        )

        for ($i = 0; $i -lt 4; $i++) {
            Show-Guide -title $labels[$i] -msg $instructions[$i]

            powershell -Command "start microsoft.windows.camera:"
            Start-Sleep -Seconds 3
            
            $wshell = New-Object -ComObject Wscript.Shell
            $wshell.AppActivate("Camera")
            Start-Sleep -Seconds 1
            $wshell.SendKeys("%~")
            Start-Sleep -Seconds 3

            $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
            $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
            
            $timestamp = (Get-Date).ToString("HH:mm:ss")
            $bitmap.Save([System.IO.Path]::Combine($picturesFolder, "negi_step_$($i).png"), [System.Drawing.Imaging.ImageFormat]::Png)

            $totalH = 0; $pixels = 0
            for ($x = [int]($screen.Width*0.2); $x -lt [int]($screen.Width*0.8); $x += 15) {
                for ($y = [int]($screen.Height*0.2); $y -lt [int]($screen.Height*0.8); $y += 15) {
                    $p = $bitmap.GetPixel($x, $y)
                    if ($p.G -gt $p.R -and $p.G -gt $p.B) {
                        $h = $p.GetHue()
                        if ($h -gt 50 -and $h -lt 170) { $totalH += $h; $pixels++ }
                    }
                }
            }
            $currentH = if ($pixels -gt 0) { [Math]::Round(($totalH / $pixels), 2) } else { 0 }
            $hValues += $currentH

            "$timestamp,$($labels[$i]),$currentH" | Out-File -FilePath $csvPath -Append -Encoding utf8

            $graphic.Dispose(); $bitmap.Dispose()
            powershell -Command "Stop-Process -Name 'Camera' -Force -ErrorAction SilentlyContinue"

            if ($i -lt 3) {
                Start-Sleep -Seconds 2
            }
        }

        # --- Generate Graph ---
        $chart = New-Object System.Windows.Forms.DataVisualization.Charting.Chart
        $chart.Size = New-Object System.Drawing.Size(640, 480)

        $chartArea = New-Object System.Windows.Forms.DataVisualization.Charting.ChartArea
        $chartArea.AxisX.Title = "Leaf Count"
        $chartArea.AxisY.Title = "Optimal H"
        $chartArea.AxisY.Minimum = 0
        $chartArea.AxisY.Maximum = 180
        $chart.ChartAreas.Add($chartArea)

        $series = New-Object System.Windows.Forms.DataVisualization.Charting.Series
        $series.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Line
        $series.BorderWidth = 3
        $series.Color = [System.Drawing.Color]::ForestGreen
        $series.MarkerStyle = [System.Windows.Forms.DataVisualization.Charting.MarkerStyle]::Circle
        $series.MarkerSize = 10
        $series.MarkerColor = [System.Drawing.Color]::Orange

        for ($j = 0; $j -lt 4; $j++) {
            $dp = New-Object System.Windows.Forms.DataVisualization.Charting.DataPoint
            $dp.SetValueXY($labels[$j], $hValues[$j])
            $series.Points.Add($dp)
        }
        $chart.Series.Add($series)

        $title = New-Object System.Windows.Forms.DataVisualization.Charting.Title
        $title.Text = "Negi Growth Monitor: Leaf Count vs Optimal H"
        $title.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
        $chart.Titles.Add($title)

        $chart.SaveImage($graphPath, [System.Windows.Forms.DataVisualization.Charting.ChartImageFormat]::Png)
