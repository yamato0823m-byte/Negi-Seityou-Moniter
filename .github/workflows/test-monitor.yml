name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. GitHubから最新のコードをあなたのPCに持ってくる
      uses: actions/checkout@v4

    - name: 2. 撮影用プログラム(exe)をその場で組み立てる
      run: |
        Write-Host "★exeファイルをその場で生成しています..."
        # ネット通信を使わず、文字からプログラムを復元します
        $base64 = ""
        [System.IO.File]::WriteAllBytes("./camera_test.exe", [System.Convert]::FromBase64String($base64))

    - name: 3. カメラを起動して3枚撮影する
      run: |
        Write-Host "★テスト開始: カメラを起動します"
        if (Test-Path "./camera_test.exe") {
            ./camera_test.exe
        } else {
            Write-Host "❌ ファイルの組み立てに失敗しました"
        }
        Write-Host "★テスト終了: 撮影完了しました"
