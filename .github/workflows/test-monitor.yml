        $h3 = if ($pixels -gt 0) { [Math]::Round(($totalH / $pixels), 2) } else { 0 }
        "$timestamp,3_leaves,$h3" | Out-File -FilePath $csvPath -Append -Encoding utf8
        $graphic.Dispose(); $bitmap.Dispose(); powershell -Command "Stop-Process -Name 'Camera' -Force -ErrorAction Ignore"
        Write-Host "-> Saved 3 leaves data! (H: $h3)"
        
        Write-Host "=================================================="
        Write-Host " EXPERIMENT COMPLETED SUCCESSFUL! "
        Write-Host "=================================================="
