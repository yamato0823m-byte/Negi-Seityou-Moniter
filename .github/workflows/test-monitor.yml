name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Save Each Graph and Safely Finish Experiment
      run: |
        $ErrorActionPreference = "SilentlyContinue"
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        Add-Type -AssemblyName WindowsBase
        [void][Reflection.Assembly]::LoadWithPartialName("System.Windows.Forms.DataVisualization")

        $picturesFolder = [Environment]::GetFolderPath('MyPictures')
        $csvPath = [System.IO.Path]::Combine($picturesFolder, "negi_data.csv")
        $latestGraphPath = [System.IO.Path]::Combine($picturesFolder, "negi_graph.png")
        
        "Time,Leaf_Count,Green_Pixel_Count" | Out-File -FilePath $csvPath -Encoding utf8

        # --- グラフ画像を生成・保存する関数 ---
        function Update-GraphImage ($currentLabels, $currentPixels, $stepIndex) {
            try {
                $chart = New-Object System.Windows.Forms.DataVisualization.Charting.Chart
                $chart.Size = New-Object System.Drawing.Size(500, 300)

                $chartArea = New-Object System.Windows.Forms.DataVisualization.Charting.ChartArea
                $chartArea.AxisX.Title = "Leaf Count"
                $chartArea.AxisY.Title = "Green Pixel Count"
                $chartArea.AxisY.Minimum = 0
                $chart.ChartAreas.Add($chartArea)

                $series = New-Object System.Windows.Forms.DataVisualization.Charting.Series
                $series.ChartType = [System.Windows.Forms.DataVisualization.Charting.SeriesChartType]::Line
                $series.BorderWidth = 4
                $series.Color = [System.Drawing.Color]::ForestGreen
                $series.MarkerStyle = [System.Windows.Forms.DataVisualization.Charting.MarkerStyle]::Circle
                $series.MarkerSize = 12
                $series.MarkerColor = [System.Drawing.Color]::Orange
                $chart.Series.Add($series)

                for ($j = 0; $j -lt $currentLabels.Count; $j++) {
                    $dp = New-Object System.Windows.Forms.DataVisualization.Charting.DataPoint
                    $dp.SetValueXY($currentLabels[$j].Split(" ")[0], $currentPixels[$j])
                    $series.Points.Add($dp)
                }

                $title = New-Object System.Windows.Forms.DataVisualization.Charting.Title
                $title.Text = "Data Graph (Step $stepIndex)"
                $title.Font = New-Object System.Drawing.Font("Arial", 12, [System.Drawing.FontStyle]::Bold)
                $chart.Titles.Add($title)

                $chart.SaveImage($latestGraphPath, [System.Windows.Forms.DataVisualization.Charting.ChartImageFormat]::Png)
                $historyGraphPath = [System.IO.Path]::Combine($picturesFolder, "negi_graph_step_$stepIndex.png")
                $chart.SaveImage($historyGraphPath, [System.Windows.Forms.DataVisualization.Charting.ChartImageFormat]::Png)
                $chart.Dispose()
            } catch {}
        }

        # --- ポップアップ表示関数 ---
        function Show-Guide ($title, $msg, $showGraph, $isFinal) {
            try {
                $form = New-Object System.Windows.Forms.Form
                $form.Text = "NEGI MONITOR REALTIME MONITOR"
                if ($showGraph) { $form.Size = New-Object System.Drawing.Size(550, 560) } else { $form.Size = New-Object System.Drawing.Size(550, 220) }
                $form.StartPosition = "CenterScreen"
                $form.TopMost = $true
                $form.BackColor = [System.Drawing.Color]::FromArgb(30, 30, 30)
                $form.FormBorderStyle = "FixedDialog"
                $form.MaximizeBox = $false

                $lblTitle = New-Object System.Windows.Forms.Label
                $lblTitle.Text = $title
                $lblTitle.Font = New-Object System.Drawing.Font("Arial", 16, [System.Drawing.FontStyle]::Bold)
                $lblTitle.ForeColor = [System.Drawing.Color]::ForestGreen
                $lblTitle.Size = New-Object System.Drawing.Size(510, 30)
                $lblTitle.Location = New-Object System.Drawing.Point(20, 20)
                $lblTitle.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTitle)

                $lblMsg = New-Object System.Windows.Forms.Label
                $lblMsg.Text = $msg
                $lblMsg.Font = New-Object System.Drawing.Font("Arial", 11, [System.Drawing.FontStyle]::Bold)
                $lblMsg.ForeColor = [System.Drawing.Color]::White
                $lblMsg.Size = New-Object System.Drawing.Size(510, 50)
                $lblMsg.Location = New-Object System.Drawing.Point(20, 60)
                $lblMsg.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblMsg)

                if ($showGraph -and (Test-Path $latestGraphPath)) {
                    $pictureBox = New-Object System.Windows.Forms.PictureBox
                    $pictureBox.Size = New-Object System.Drawing.Size(500, 300)
                    $pictureBox.Location = New-Object System.Drawing.Point(20, 120)
                    $pictureBox.SizeMode = [System.Windows.Forms.PictureBoxSizeMode]::StretchImage
                    $bytes = [System.IO.File]::ReadAllBytes($latestGraphPath)
                    $ms = New-Object System.IO.MemoryStream(,$bytes)
                    $pictureBox.Image = [System.Drawing.Image]::FromStream($ms)
                    $form.Controls.Add($pictureBox)
                    $timerY = 440
                } else {
                    $timerY = 130
                }

                $lblTimer = New-Object System.Windows.Forms.Label
                $lblTimer.Font = New-Object System.Drawing.Font("Arial", 14, [System.Drawing.FontStyle]::Bold)
                $lblTimer.Size = New-Object System.Drawing.Size(510, 30)
                $lblTimer.Location = New-Object System.Drawing.Point(20, $timerY)
                $lblTimer.TextAlign = "MiddleCenter"
                $form.Controls.Add($lblTimer)

                $form.Show()
                $maxTime = if ($isFinal) { 10 } else { 15 }
                for ($countdown = $maxTime; $countdown -gt 0; $countdown--) {
                    if ($isFinal) {
                        $lblTimer.ForeColor = [System.Drawing.Color]::LightBlue
                        $lblTimer.Text = "Closing this window automatically in $($countdown)s..."
                    } else {
                        $lblTimer.ForeColor = [System.Drawing.Color]::Yellow
                        $lblTimer.Text = "Remaining: $($countdown)s"
                    }
                    [System.Windows.Forms.Application]::DoEvents()
                    Start-Sleep -Seconds 1
                }
                $form.Close()
                if ($pictureBox) { $pictureBox.Dispose(); $ms.Dispose() }
                $form.Dispose()
            } catch {}
        }

        $pixelValues = @()
        $doneLabels = @()
        $labels = @("0 Leaves Test", "1 Leaf Test", "2 Leaves Test", "3 Leaves Test", "4 Leaves Test")
        $instructions = @(
            "Please clean the desk! Make it 0 leaves.",
            "Please ADD 1 leaf on the desk now!",
            "Please ADD 2nd leaf on the desk now!",
            "Please ADD 3rd leaf on the desk now!",
            "Please ADD 4th leaf on the desk now!"
        )

        if (Test-Path $latestGraphPath) { Remove-Item $latestGraphPath -Force }

        # 5回ループ実験
        for ($i = 0; $i -lt 5; $i++) {
            $showGraphFlag = $i -gt 0
            Show-Guide -title $labels[$i] -msg $instructions[$i] -showGraph $showGraphFlag -isFinal $false

            powershell -Command "start microsoft.windows.camera:"
            Start-Sleep -Seconds 3
            
            $wshell = New-Object -ComObject Wscript.Shell
            $wshell.AppActivate("Camera")
            Start-Sleep -Seconds 1
            $wshell.SendKeys("%~")
            Start-Sleep -Seconds 3

            $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
            $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
            
            $timestamp = (Get-Date).ToString("HH:mm:ss")
            $bitmap.Save([System.IO.Path]::Combine($picturesFolder, "negi_step_$($i).png"), [System.Drawing.Imaging.ImageFormat]::Png)

            # --- 画素数のカウント処理（間引きなし・全画素探索モードに改造） ---
            $greenPixels = 0
            $minH = 50
            $maxH = 170
            
            # xとyのステップを「+= 15」から「++ (1ずつ)」に修正し、全ピクセルをスキャン
            for ($x = [int]($screen.Width*0.2); $x -lt [int]($screen.Width*0.8); $x++) {
                for ($y = [int]($screen.Height*0.2); $y -lt [int]($screen.Height*0.8); $y++) {
                    $p = $bitmap.GetPixel($x, $y)
                    if ($p.G -gt $p.R -and $p.G -gt $p.B) {
                        $h = $p.GetHue()
                        if ($h -gt $minH -and $h -lt $maxH) { $greenPixels++ }
                    }
                }
            }
            
            $pixelValues += $greenPixels
            $doneLabels += $labels[$i]

            "$timestamp,$($labels[$i]),$greenPixels" | Out-File -FilePath $csvPath -Append -Encoding utf8

            $graphic.Dispose(); $bitmap.Dispose()
            powershell -Command "Stop-Process -Name 'Camera' -Force"

            Update-GraphImage -currentLabels $doneLabels -currentPixels $pixelValues -stepIndex $i
            Start-Sleep -Seconds 2
        }

        # --- 3. 英語のプログラム終了メッセージ画面（完成グラフを添えて） ---
        Show-Guide -title "EXPERIMENT COMPLETELY FINISHED!" -msg "The program has safely completed all processes.`nAll graph images are saved in Pictures folder." -showGraph $true -isFinal $true
        
        exit 0
