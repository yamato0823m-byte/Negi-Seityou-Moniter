name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. GitHubから最新のコードをあなたのPCに持ってくる
      uses: actions/checkout@v4

    - name: 2. 撮影用プログラム(exe)をダウンロードする
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/rentalserver-test/test/main/camera_test.exe" -OutFile "camera_test.exe"

    - name: 3. カメラを起動して3枚撮影する
      run: |
        Write-Host "★テスト開始: カメラを起動します"
        ./camera_test.exe
        Write-Host "★テスト終了: 撮影完了しました"
