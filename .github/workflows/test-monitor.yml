name: Negi Monitor Test

# 手動で「ボタン」を押した時に、あなたのPCでプログラムを実行する設定
on:
  workflow_dispatch:

jobs:
  run-monitor:
    # 先ほど合体させた「あなたのPC（self-hosted）」を指定！
    runs-on: self-hosted

    steps:
    - name: 1. GitHubから最新のコードをあなたのPCに持ってくる
      uses: actions/checkout@v4

    - name: 2. あなたのPCで撮影＆グラフ化プログラムを実行する
      run: |
        python -c "
        import cv2
        import time
        print('★テスト開始: カメラを起動します')
        cap = cv2.VideoCapture(0)
        if not cap.isOpened():
            print('❌ カメラが見つかりません！接続を確認してください')
            exit()
        
        # テストとして、3秒おきに3回だけ撮影してみる
        for i in range(3):
            ret, frame = cap.read()
            if ret:
                cv2.imwrite(f'negi_test_{i}.jpg', frame)
                print(f'📸 {i+1}枚目の撮影に成功しました！')
            time.sleep(3)
        cap.release()
        print('★テスト終了: 撮影完了しました')
        "
