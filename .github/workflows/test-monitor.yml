name: Negi Monitor Test

on:
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: self-hosted

    steps:
    - name: 1. Checkout
      uses: actions/checkout@v4

    - name: 2. Open Camera Maximize and Take Photo
      run: |
        Write-Host "START CAMERA"
        powershell -Command "start microsoft.windows.camera:"
        Start-Sleep -Seconds 3
        
        Write-Host "MAXIMIZE WINDOW"
        # カメラアプリのウィンドウを画面いっぱいに最大化する命令
        $wshell = New-Object -ComObject Wscript.Shell
        $wshell.AppActivate("カメラ")
        Start-Sleep -Seconds 1
        $wshell.SendKeys("%~") # Alt + Enter で全画面化
        Start-Sleep -Seconds 3
        
        Write-Host "TAKE PHOTO"
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
        $bitmap = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
        $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
        $graphic.CopyFromScreen($screen.X, $screen.Y, 0, 0, $screen.Size)
        
        $path = [System.IO.Path]::Combine([Environment]::GetFolderPath('MyPictures'), 'negi_photo.png')
        $bitmap.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
        
        $graphic.Dispose()
        $bitmap.Dispose()
        Write-Host "SUCCESS: FULLSIZE PHOTO SAVED"
